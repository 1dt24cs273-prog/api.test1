<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Sentinel - Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0b1120; /* Very dark blue/slate */
            color: #94a3b8; /* slate-400 */
        }

        .bg-panel {
            background-color: #1e293b; /* slate-800 */
        }

        .btn-green {
            background-color: #10b981; /* emerald-500 */
            color: #022c22;
        }

        .btn-green:hover {
            background-color: #34d399; /* emerald-400 */
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen p-8 flex flex-col items-center">

    <div class="w-full max-w-5xl">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 border-b border-slate-700/50 pb-4">
            <h1 class="text-2xl font-bold tracking-widest text-emerald-400 uppercase flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                API SENTINEL
            </h1>
            <div id="liveClock" class="text-sm text-slate-500 tracking-wider">
                <!-- Clock populated via JS -->
            </div>
        </header>

        <!-- Main Input Container -->
        <section class="bg-[#151e2e] border border-slate-700/60 rounded-xl p-6 shadow-2xl mb-8">
            <h2 class="text-xs font-bold text-slate-500 mb-4 tracking-widest uppercase mb-4">TARGET API ENDPOINT</h2>
            
            <form id="checkForm" class="flex flex-col md:flex-row gap-4">
                <input type="url" id="url" required placeholder="https://api.github.com" 
                        class="flex-grow bg-[#0f172a] border border-slate-700 text-slate-300 p-3 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm font-mono placeholder-slate-600 transition-colors">
                
                <button type="submit" id="submitBtn" 
                        class="btn-green font-bold py-3 px-8 rounded-md transition-all uppercase tracking-widest text-sm flex-shrink-0 hover:shadow-[0_0_15px_rgba(16,185,129,0.4)]">
                    RUN CHECK
                </button>
            </form>
        </section>

        <!-- History Container -->
        <section class="bg-[#151e2e] border border-slate-700/60 rounded-xl p-6 shadow-2xl">
            <h2 class="text-xs font-bold text-slate-500 mb-4 tracking-widest uppercase mb-4">CHECK HISTORY &ndash; LAST 10</h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead>
                        <tr class="text-slate-500 border-b border-slate-700/60 text-xs">
                            <th class="py-3 px-4 font-normal tracking-wider w-32">STATUS</th>
                            <th class="py-3 px-4 font-normal tracking-wider">URL</th>
                            <th class="py-3 px-4 font-normal tracking-wider text-center w-24">CODE</th>
                            <th class="py-3 px-4 font-normal tracking-wider text-right w-32">LATENCY</th>
                            <th class="py-3 px-4 font-normal tracking-wider text-right w-40">TIME</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="divide-y divide-slate-700/30">
                        <!-- Rows injected here via JS -->
                    </tbody>
                </table>
                <div id="loadingIndicator" class="hidden text-center py-8 text-slate-500 animate-pulse text-xs tracking-widest">
                    AWAITING TELEMETRY...
                </div>
                <div id="emptyState" class="text-center py-12 text-slate-600 tracking-widest text-xs hidden">
                    NO DATA AVAILABLE
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-16 text-center text-xs text-slate-600 tracking-widest uppercase">
            API SENTINEL v1.0 &bull; MISSION CONTROL INTERFACE
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
